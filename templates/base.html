<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fraud Risk Control System</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            padding-top: 90px;
        }

        /* Navbar */
        header .navbar {
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header .navbar-brand {
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }
        nav a.nav-link {
            color: #fff !important;
            font-weight: 600;
            font-size: 1.05rem;
            transition: 0.3s;
        }
        nav a.nav-link:hover {
            color: #ffc107 !important;
        }

        /* Main container */
        main.container {
            margin-top: 30px;
            margin-bottom: 50px;
        }

        /* Cards */
        .card {
            margin-bottom: 25px;
            border-radius: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .card h2, .card h3 {
            font-weight: 700;
            font-size: 1.5rem;
        }
        .card p {
            font-size: 1.05rem;
        }

        /* Table headers */
        table th {
            background-color: #343a40;
            color: #fff;
            font-size: 1rem;
        }
        table td {
            font-size: 0.95rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 25px 0;
            color: #6c757d;
            font-size: 0.95rem;
            border-top: 1px solid #dee2e6;
        }

        /* Buttons */
        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-danger {
            background-color: #dc3545;
            border: none;
        }
        .btn-danger:hover {
            background-color: #a71d2a;
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <!-- Brand -->
            <a class="navbar-brand" href="{{ url_for('about') }}">
                Fraud Control
            </a>

            <!-- Toggler -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('data_entry') }}">Data Entry</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('predict') }}">Prediction</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('fraud_records') }}">Fraud Records</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('normal_records') }}">Normal Records</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main class="container">
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; {{ current_year if current_year else "2026" }} Fraud Risk Control System. All rights reserved.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
